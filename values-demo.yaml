## Minimal-friction demo profile:
## - avoids requiring a default StorageClass
## - keeps the same-namespace ThingsBoard default
## - leaves demo mode enabled
## Fill either demo.admin.* to auto-create the device or demo.device.token to reuse one.

persistence:
  enabled: false

demo:
  admin:
    username: tenant@thingsboard.org
    password: tenant
  device:
    token: ""
