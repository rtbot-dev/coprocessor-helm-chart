name: Publish Coprocessor Chart

on:
  push:
    tags:
      - coprocessor-chart-v*
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CHART_DIR: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve chart metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          chart_version="$(python3 - <<'PY'
          import pathlib

          for line in pathlib.Path('Chart.yaml').read_text().splitlines():
              if line.startswith('version:'):
                  print(line.split(':', 1)[1].strip())
                  break
          else:
              raise SystemExit('unable to determine chart version from Chart.yaml')
          PY
          )"
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          expected_tag="coprocessor-chart-v${chart_version}"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" != "${expected_tag}" ]]; then
            printf 'Tag %s does not match Chart.yaml version %s\n' "${GITHUB_REF_NAME}" "${chart_version}" >&2
            exit 1
          fi

          {
            printf 'chart_version=%s\n' "${chart_version}"
            printf 'owner_lc=%s\n' "${owner_lc}"
            printf 'chart_ref=oci://ghcr.io/%s/helm-charts/coprocessor\n' "${owner_lc}"
          } >> "${GITHUB_OUTPUT}"

      - name: Lint chart
        run: helm lint "${CHART_DIR}"

      - name: Log in to GHCR for Helm OCI
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password "${GH_TOKEN}"

      - name: Package chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package "${CHART_DIR}" --destination dist

      - name: Push chart to GHCR
        shell: bash
        run: |
          set -euo pipefail
          helm push "dist/coprocessor-${{ steps.meta.outputs.chart_version }}.tgz" \
            "oci://ghcr.io/${{ steps.meta.outputs.owner_lc }}/helm-charts"

      - name: Verify pull-back from GHCR
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verify
          helm pull "${{ steps.meta.outputs.chart_ref }}" \
            --version "${{ steps.meta.outputs.chart_version }}" \
            --destination verify
