name: Publish rtbot-redis

on:
  workflow_dispatch:
    inputs:
      source_image_ref:
        description: Private GAR image reference to mirror, including tag or digest
        required: true
        type: string
      public_version:
        description: Public tag to publish as ghcr.io/rtbot-dev/rtbot-redis:<public_version>
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve registry metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          source_ref='${{ inputs.source_image_ref }}'
          gar_host="${source_ref%%/*}"
          target_ref="ghcr.io/rtbot-dev/rtbot-redis:${{ inputs.public_version }}"

          if [[ "${gar_host}" != *pkg.dev ]]; then
            printf 'Expected Artifact Registry host in source_image_ref, got %s\n' "${gar_host}" >&2
            exit 1
          fi

          {
            printf 'source_ref=%s\n' "${source_ref}"
            printf 'gar_host=%s\n' "${gar_host}"
            printf 'target_ref=%s\n' "${target_ref}"
          } >> "${GITHUB_OUTPUT}"

      - name: Configure Docker for GAR
        shell: bash
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${{ steps.meta.outputs.gar_host }}" --quiet

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull from GAR
        run: docker pull "${{ steps.meta.outputs.source_ref }}"

      - name: Retag for GHCR
        run: docker tag "${{ steps.meta.outputs.source_ref }}" "${{ steps.meta.outputs.target_ref }}"

      - name: Push to GHCR
        run: docker push "${{ steps.meta.outputs.target_ref }}"
