nameOverride: ""
fullnameOverride: ""

commonLabels: {}
commonAnnotations: {}

imagePullSecrets: []

kernelId: "default"

images:
  rtbotRedis:
    repository: ghcr.io/rtbot-dev/rtbot-redis
    tag: "0.3.0"
    pullPolicy: IfNotPresent
  sqlRunner:
    repository: redis
    tag: "7.2"
    pullPolicy: IfNotPresent
  connect:
    repository: docker.redpanda.com/redpandadata/connect
    tag: "4.84.0"
    pullPolicy: IfNotPresent
  demoTools:
    repository: python
    tag: "3.12-alpine"
    pullPolicy: IfNotPresent

serviceAccount:
  create: true
  labels: {}
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext:
  fsGroup: 101
  runAsUser: 100
  runAsGroup: 101

statefulset:
  replicas: 1
  labels: {}
  annotations: {}
  terminationGracePeriodSeconds: 30

headlessService:
  labels: {}
  annotations: {}

service:
  type: ClusterIP
  port: 4195
  nodePort: null
  labels: {}
  annotations: {}

thingsboard:
  baseUrl: http://thingsboard:8080
  apiKey: ""
  existingSecret: ""
  existingSecretKey: THINGSBOARD_URL

sql:
  mountPath: /sql
  existingConfigMap: ""
  files: {}
  selectedFiles: []
  bootstrapJob:
    enabled: true
    backoffLimit: 3
    hook: true
    annotations: {}
    labels: {}

demo:
  enabled: true
  sqlFileName: 00-demo.sql
  ingressStream: demo_sensors
  egressStreams:
    - rtbot:mv:default:demo_signals
  alarmRules:
    enabled: true
  device:
    name: coprocessor-demo-device
    type: coprocessor-demo
    token: ""
    existingSecret: ""
    existingSecretKey: DEMO_DEVICE_TOKEN
  admin:
    username: tenant@thingsboard.org
    password: tenant
    existingSecret: ""
    usernameKey: THINGSBOARD_USERNAME
    passwordKey: THINGSBOARD_PASSWORD
  bootstrapJob:
    enabled: true
    backoffLimit: 3
    hook: true
    annotations: {}
    labels: {}
    resources: {}
  publisher:
    enabled: true
    intervalSeconds: 5
    baseTemperature: 21
    amplitude: 4
    stepDegrees: 0.8
    resources: {}

connect:
  mountPath: /etc/coprocessor/connect
  port: 4195
  existingConfigMap: ""
  extraEnvFrom: []
  ingress:
    path: /ingest/{stream_name}
    allowedVerbs:
      - POST
    timeout: 5s
    deviceIdHeader: X-Device-Id
    timestampHeader: X-Timestamp-Ms
    successStatus: "200"
    errorStatus: "400"
    maxStreamLength: 10000
    maxInFlight: 64
  egress:
    enabled: false
    stream: ""
    streams: []
    consumerGroup: coprocessor-egress-group
    clientId: coprocessor-connect-egress
    startFromOldest: true
    commitPeriod: 1s
    retries: 3
    retryPeriod: 1s
    timeout: 5s
  extraEnv: []
  resources: {}

rtbotRedis:
  port: 6379
  args:
    - --protected-mode
    - "no"
  extraEnvFrom: []
  resources: {}

sqlRunner:
  waitForRedis:
    maxRetries: 180
    retryDelaySeconds: 2
  extraEnvFrom: []
  extraEnv: []
  resources: {}

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  storageClassName: ""
  annotations: {}
  labels: {}

secret:
  create: false
  labels: {}
  annotations: {}
  stringData: {}

nodeSelector: {}
tolerations: []
affinity: {}
