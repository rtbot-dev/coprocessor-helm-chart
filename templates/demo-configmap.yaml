{{- if .Values.demo.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "coprocessor.demoConfigMapName" . }}
  labels:
    {{- include "coprocessor.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-scripts
data:
  publisher.py: |
{{ .Files.Get "files/demo/publisher.py" | indent 4 }}
  bootstrap.py: |
{{ .Files.Get "files/demo/bootstrap.py" | indent 4 }}
  dashboard.json: |
{{ .Files.Get "files/demo/dashboard.json" | indent 4 }}
{{- end }}
